name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# GitHub-hosted Actions are gated behind manual dispatch for routine use
# to avoid private-repo billing/quota limits on feature branches.
# The authoritative local gate is: `python scripts/validate.py`

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run tests
        run: |
          python -m unittest discover -s tests -v
      - name: Dogfood mdguard
        run: |
          python -m mdguard.cli docs README.md CONTRIBUTING.md

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
      - name: Check formatting
        run: |
          python -m pip install ruff
          python -m ruff format --check .

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
      - name: Clippy-style lint
        run: |
          python -m pip install ruff
          python -m ruff check .

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build

  bidi-scan:
    name: "Hidden / bidirectional Unicode scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Scan for bidirectional Unicode
        run: python scripts/bidi-scan.py
