name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# GitHub-hosted Actions are intentionally gated behind manual dispatch for
# routine pushes to avoid private-repo billing/quota limits on feature branches.
# Push/PR triggers are supported here but quota may still apply.
# The authoritative local gate is: `python scripts/validate.py`

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run tests
        run: |
          python -m unittest discover -s tests -v
      - name: Dogfood mdguard
        run: |
          python -m mdguard.cli docs README.md CONTRIBUTING.md

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
      - name: Check formatting
        run: |
          python -m pip install ruff
          python -m ruff format --check .

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bidirectional Unicode scan
        run: python scripts/bidi-scan.py

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python -m pip install --upgrade pip build
          python -m build
