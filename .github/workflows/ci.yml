name: CI

on:
  workflow_dispatch:

# GitHub-hosted Actions are intentionally manual for this repo so the default
# branch is not blocked by private-repo billing/quota limits. Use
# `python scripts/validate.py` as the authoritative local gate before pushing.

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12", "3.14"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        allow-prereleases: true
    - name: Install package
      run: |
        python -m pip install --upgrade pip
        python -m pip install -e .
    - name: Run tests
      run: |
        python -m unittest discover -s tests -v
    - name: Dogfood mdguard
      run: |
        python -m mdguard.cli docs README.md CONTRIBUTING.md

  package:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Build and smoke-test package
      run: |
        python -m pip install --upgrade pip build
        python -m build
        python -m venv .venv-smoke
        . .venv-smoke/bin/activate
        python -m pip install dist/*.whl
        mdguard --version
        mdguard --list-rules --verbose
