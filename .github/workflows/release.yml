name: Release validation

on:
  push:
    tags: ['v*']
  workflow_dispatch:

# Keep release validation manual for routine use while GitHub-hosted Actions are
# gated by private-repo billing/quota limits. The authoritative release gate is:
# `python scripts/validate.py`.

jobs:
  package-smoke-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Smoke-test installed package
        run: |
          python -m venv .venv-smoke
          . .venv-smoke/bin/activate
          python -m pip install dist/*.whl
          mdguard --version
          mdguard --list-rules --verbose
